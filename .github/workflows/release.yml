# Build release binaries, attach archives + checksums to a GitHub Release, and push
# a multi-arch container image to GitHub Container Registry (ghcr.io).
#
# Usage:
#   git tag -a v1.2.3 -m "Release v1.2.3"
#   git push origin v1.2.3
#
# Rebuild an existing tag (same artifacts + image tags): Actions → Release → Run workflow,
# and enter the tag (e.g. v1.2.3).

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to rebuild (e.g. v1.2.3)'
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.25'

jobs:
  build-assets:
    name: Build (${{ matrix.asset_suffix }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            asset_suffix: linux-amd64
          # Native arm64 (free on public repos; private repos may need to drop this row or use a paid arm runner)
          - runs_on: ubuntu-24.04-arm
            asset_suffix: linux-arm64
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm make libbpf-dev linux-headers-generic

      - name: Build and test
        run: |
          make all
          go test ./...

      - name: Package
        run: |
          mkdir -p dist
          tar -czvf "dist/cerberus_${RELEASE_TAG}_${{ matrix.asset_suffix }}.tar.gz" \
            -C build cerberus cerberus_tc.o
          ls -la dist/

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: cerberus-${{ matrix.asset_suffix }}
          path: dist/*.tar.gz

  github-release:
    name: GitHub Release
    needs: [build-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cerberus-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Cerberus ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS

  docker:
    name: Docker image (GHCR)
    runs-on: ubuntu-latest
    needs: [build-assets]
    permissions:
      contents: read
      packages: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Image name (lowercase for GHCR)
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }}
            type=raw,value=latest

      - name: Compute build metadata
        id: build_meta
        run: |
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT=${{ steps.build_meta.outputs.commit }}
            BUILD_DATE=${{ steps.build_meta.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
