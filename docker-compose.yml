services:
  cerberus:
    image: ghcr.io/zrougamed/cerberus:latest
    container_name: cerberus
    privileged: true
    network_mode: host
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:rw
      - /sys/fs/bpf:/sys/fs/bpf:rw
      - ./data:/app/data
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
      - BPF
      - PERFMON
    security_opt:
      - apparmor=unconfined
    environment:
      - DEBIAN_FRONTEND=noninteractive
      - CERBERUS_HTTP_ADDR=0.0.0.0:8080
    restart: unless-stopped
